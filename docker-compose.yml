services:
  mysql:
    image: mysql:8.0
    container_name: inex-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./docker/mysql/mysql_data:/var/lib/mysql
      - ./docker/mysql/initdb:/docker-entrypoint-initdb.d:ro
      - ./docker/mysql/conf/charset.cnf:/etc/mysql/conf.d/charset.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 20s
      retries: 10
    networks:
      - inex-network
    restart: unless-stopped

  api:
    image: ${ECR_IMAGE_URI}
    container_name: inex-api
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ConnectionStrings__InExConnection: "Server=mysql;Port=3306;Database=${DB_NAME};Uid=${DB_USER};Pwd=${DB_PASSWORD};Convert Zero Datetime=True;"
      ASPNETCORE_URLS: http://+:80
    networks:
      - inex-network
    restart: unless-stopped

networks:
  inex-network:
    driver: bridge
